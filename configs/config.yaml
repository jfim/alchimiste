# Top-level Hydra config for the text cleaner training pipeline.
# Composes the data / model / training / eval sub-configs and adds
# mlflow + reproducibility settings.

defaults:
  - data: default
  - model: encoder_hf        # default architecture; override on the CLI with `model=...`
  - training: default
  - eval: default
  - _self_
  # Per-machine overrides (tracking URI, alambic base URL, etc.).
  # Looks for configs/local/default.yaml (gitignored); silently skipped
  # when absent. `@_global_` lands keys at the config root so contents
  # like `mlflow.tracking_uri` override the matching top-level keys
  # instead of nesting under a `local` package.
  - optional local@_global_: default

mlflow:
  experiment: alchimiste-text-cleaner
  # Architecture-keyed so each model family has its own version history
  # in the registry, instead of all architectures sharing one version list.
  model_name: alchimiste-text-cleaner-${model.name}
  tracking_uri: ${oc.env:MLFLOW_TRACKING_URI,file://./mlruns}
  # Optional per-run annotation knobs (autoresearch / sweep ergonomics).
  # `run_name_suffix`: when set, the MLflow run is named `<arch>-<suffix>`
  # instead of `<arch>-<hydra-timestamp>`. Use a short slug that identifies
  # what the experiment varies, e.g. `ep6-clw10`.
  run_name_suffix: ""
  # `note`: free-form description (markdown supported) surfaced in the
  # MLflow UI as the run's "Description" via the `mlflow.note.content` tag.
  note: ""
  # `autoresearch`: groups runs from an automated experiment campaign.
  # Logged as the `alchimiste.autoresearch` tag with this exact value so
  # the UI can filter by batch ("batch-1") or by presence (any non-empty
  # value = an autoresearch run). Empty → unset, leaving manual runs
  # unmarked.
  autoresearch: ""
  # `register_model`: when true, upload the trained model as a registered
  # pyfunc to the tracking server. The file is ~300 MB for ModernBERT and
  # the upload to a remote server is flaky — keep off for exploratory and
  # sweep runs. Flip on when promoting a specific run. The artifact dir
  # under outputs/<date>/<time>/model/ is unaffected and can always be
  # reloaded locally via `just eval`.
  register_model: false

seed: 17                     # NFR-001 reproducibility; also seeds data/split.py
