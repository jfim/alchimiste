# Data layer config — oxen working tree, NFC handling, sequence length.

oxen_dir: ./alchimiste-data
stage: cleaning

# REQ-014: refuse a dirty working tree by default — the recorded commit
# hash would not represent what was trained on.
allow_dirty: false

# REQ-013: enforce NFC normalization on read. Until alambic emits NFC
# natively (Open Question Q3), set to false to normalize defensively.
require_nfc: true

# alambic emits codepoint offsets into NFC-normalized text as of 2026-05-21
# (closed Open Question Q3). The transitional "byte" mode remains supported
# in the loader for replaying older oxen commits.
range_units: codepoint

# Hard truncation for documents that exceed the model's context window
# (out of scope: streaming / chunked inference). Truncated articles are
# logged so v2 can decide whether to chunk.
max_seq_len: 512

# Drop articles whose NFC markdown is shorter than this in UTF-8 bytes.
# Tiny rows are usually stubs / boilerplate-only pages and add noise
# without signal. 0 disables the filter.
min_bytes: 1024

# Seed for the train/val/test partition only. Separate from the top-
# level `seed` (which drives weight init / DataLoader shuffle / dropout)
# so that multi-seed averaging can hold the split fixed while varying
# only the training trajectory. Defaults to ${seed} for backward
# compatibility — existing recipes that only set `seed` produce the
# same split they used to.
split_seed: ${seed}

# On-disk cache for tokenized articles. Keyed by (hf_model_name,
# max_seq_len, range_units, require_nfc, article-set sha) so a cached
# entry is only used when every input affecting tokenization is
# unchanged. Saves the per-run tokenization cost across distinct
# `just train` invocations. Set to "" to disable.
tokenization_cache_dir: .cache/tokenized
