# HuggingFace encoder + token-classification head.
#
# Adding a new architecture is one new module under
# src/alchimiste/cleaner/models/ and one new yaml here pointing at it.
# The training loop dynamically imports `module` (TASK-013).

# @package model
name: encoder_hf
module: alchimiste.cleaner.models.encoder_hf
hf_model_name: distilbert-base-uncased

# Pluggable classification head — see `models/heads.py`. The default
# linear head matches HF's built-in `XxxForTokenClassification` head
# shape (dropout + linear projection); switch `type` to register new
# head architectures (CRF, conv+linear, BiLSTM+CRF, …) without changing
# the encoder side.
head:
  type: linear
  dropout: 0.1
